<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>홍보 컨텐츠 관리</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .msg-card {
      background: var(--bg-card);
      border: 1px solid var(--bdr-s);
      border-radius: var(--r12);
      padding: 18px 20px;
      box-shadow: var(--sh-sm);
      transition: box-shadow var(--t), transform var(--t);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg-card:hover { box-shadow: var(--sh-md); transform: translateY(-2px); }
    .msg-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }
    .msg-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--txt-1);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .msg-content {
      font-size: 13px;
      color: var(--txt-2);
      line-height: 1.6;
      background: var(--bg-sub);
      border-radius: var(--r8);
      padding: 10px 12px;
      min-height: 60px;
      white-space: pre-wrap;
      word-break: break-word;
      flex: 1;
    }
    .msg-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .msg-date { font-size: 11.5px; color: var(--txt-3); }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/index.html" class="brand">
    <span class="brand-name">We-Connect</span>
  </a>
  <div class="spacer"></div>
  <a href="/index.html">발송</a>
  <a href="/customers.html" data-role="admin">고객사</a>
  <a href="/messages.html" style="color:#fff;font-weight:700">메시지</a>
  <a href="/history.html" data-role="admin">이력</a>
  <a href="/settings.html" data-role="admin">⚙️</a>
  <span id="navUserName" class="user-name"></span>
  <button class="btn-logout" onclick="logout()">로그아웃</button>
</nav>

<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px">
    <h2 style="font-size:18px;font-weight:800;letter-spacing:-0.4px">📝 홍보 컨텐츠 관리</h2>
    <button class="btn btn-kakao" onclick="openAdd()">+ 콘텐츠 추가</button>
  </div>

  <div id="msgGrid" class="msg-grid">
    <div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--txt-3)">
      로딩 중...
    </div>
  </div>
</div>

<!-- 추가/수정 모달 -->
<div class="modal-overlay" id="modal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <span id="modalTitle">콘텐츠 추가</span>
      <button class="btn-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">

      <div class="form-group">
        <label>메시지 제목 <span style="color:var(--red)">*</span></label>
        <input type="text" id="f_title" placeholder="예: 비즈플레이 클라우드 업데이트">
      </div>

      <div class="form-group">
        <label>링크 <small style="color:var(--txt-3);font-weight:normal">(선택 · 홍보 URL)</small></label>
        <input type="url" id="f_link" placeholder="예: https://www.bizplay.co.kr">
      </div>

      <div class="form-group">
        <label>이메일 본문 <span style="color:var(--red)">*</span></label>
        <textarea id="f_email_body" rows="7" placeholder="발송할 이메일 본문을 입력하세요&#10;&#10;줄바꿈은 이메일에서 그대로 유지됩니다."></textarea>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn btn-kakao" id="saveBtn" onclick="save()">저장</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:340px">
    <div class="modal-header">
      <span>삭제 확인</span>
      <button class="btn-close" onclick="closeDeleteModal()">×</button>
    </div>
    <div class="modal-body">
      <strong id="deleteTarget"></strong> 메시지를 삭제하시겠습니까?
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeDeleteModal()">취소</button>
      <button class="btn btn-danger" onclick="doDelete()">삭제</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
let deleteId = null

document.addEventListener('DOMContentLoaded', async () => {
  const user = await requireAuth()
  if (!user) return
  setupNavByRole(user.role)
  load()
})

async function load() {
  const { data, error } = await sb.from('messages').select('*').order('created_at', { ascending: false })
  if (error) { showToast('불러오기 실패', 'danger'); return }
  render(data || [])
}

function render(list) {
  const grid = document.getElementById('msgGrid')
  if (!list.length) {
    grid.innerHTML = `
      <div style="grid-column:1/-1" class="empty-state">
        <span class="icon">📝</span>
        <div>등록된 메시지가 없습니다</div>
        <p>+ 콘텐츠 추가 버튼을 눌러 첫 메시지를 만들어보세요</p>
      </div>`
    return
  }

  grid.innerHTML = list.map(m => {
    const dt = new Date(m.created_at)
    const dateStr = `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`
    const bodyText = m.content || ''
    return `
      <div class="msg-card">
        <div class="msg-title">
          <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.title}</span>
        </div>
        <div class="msg-content">${bodyText ? escHtml(bodyText) : '<span style="color:var(--txt-3);font-style:italic">내용 없음</span>'}</div>
        <div class="msg-footer">
          <span class="msg-date">📅 ${dateStr}</span>
          <div style="display:flex;gap:6px">
            <button class="btn btn-outline btn-sm" onclick='openEdit(${JSON.stringify(m).replace(/'/g,"&#39;")})'>수정</button>
            <button class="btn btn-danger btn-sm" onclick="confirmDelete(${m.id},'${m.title.replace(/'/g,"\\'")}')">삭제</button>
          </div>
        </div>
      </div>
    `
  }).join('')
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;')
}

function openAdd() {
  document.getElementById('modalTitle').textContent = '콘텐츠 추가'
  document.getElementById('editId').value = ''
  document.getElementById('f_title').value = ''
  document.getElementById('f_link').value = ''
  document.getElementById('f_email_body').value = ''
  document.getElementById('modal').classList.add('open')
}

function openEdit(m) {
  document.getElementById('modalTitle').textContent = '콘텐츠 수정'
  document.getElementById('editId').value = m.id
  document.getElementById('f_title').value = m.title || ''
  document.getElementById('f_link').value = m.link || ''
  document.getElementById('f_email_body').value = m.content || ''
  document.getElementById('modal').classList.add('open')
}

function closeModal() { document.getElementById('modal').classList.remove('open') }

async function save() {
  const id      = document.getElementById('editId').value
  const title   = document.getElementById('f_title').value.trim()
  const content = document.getElementById('f_email_body').value.trim()
  if (!title)   { showToast('메시지 제목을 입력하세요.', 'warning'); return }
  if (!content) { showToast('이메일 본문을 입력하세요.', 'warning'); return }

  const link = document.getElementById('f_link').value.trim()
  const row = { title, channel: 'email', content, link: link || null, template_code: null, image_url: null }

  const { error } = id
    ? await sb.from('messages').update(row).eq('id', id)
    : await sb.from('messages').insert(row)

  if (error) { showToast('저장 실패: ' + error.message, 'danger'); return }
  closeModal()
  showToast(id ? '수정되었습니다.' : '추가되었습니다.')
  load()
}

function confirmDelete(id, title) {
  deleteId = id
  document.getElementById('deleteTarget').textContent = `"${title}"`
  document.getElementById('deleteModal').classList.add('open')
}
function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('open') }

async function doDelete() {
  const { error } = await sb.from('messages').delete().eq('id', deleteId)
  if (error) { showToast('삭제 실패', 'danger'); return }
  closeDeleteModal()
  showToast('삭제되었습니다.')
  load()
}
</script>
</body>
</html>
