<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메일 발송</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    #layout { align-items: start; }

    .recv-card {
      position: sticky;
      top: 72px;
      display: flex;
      flex-direction: column;
    }
    .recv-card .card {
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 110px);
      overflow: hidden;
    }
    .recv-table-wrap {
      flex: 1;
      overflow-x: auto;
      overflow-y: auto;
      min-height: 0;
    }

    #customerTable td,
    #customerTable th { white-space: nowrap; }
    #customerTable td.email-cell {
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .link-row {
      font-size: 13.5px;
      color: var(--txt-2);
      margin-bottom: 14px;
      display: none;
    }
    .link-row a {
      color: #4285f4;
      text-decoration: underline;
      word-break: break-all;
    }

    .bottom-btns {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 8px;
      margin-top: 4px;
    }
    .btn-preview {
      background: #fff;
      border: 1.5px solid var(--bdr);
      color: var(--txt-2);
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      padding: 13px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-preview:hover { background: var(--bg-sub); }

    /* 미리보기 모달 */
    .preview-modal-wrap {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      display: none;
    }
    .preview-modal-wrap.open { display: flex; }
    .preview-modal {
      background: #fff;
      border-radius: 12px;
      width: 520px;
      max-width: 95vw;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
    }
    .preview-modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--bdr-s);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
      font-size: 15px;
    }
    .preview-modal-body { padding: 20px; }
    .preview-field-label {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--txt-3);
      margin-bottom: 4px;
    }
    .preview-field-value {
      font-size: 14px;
      color: var(--txt-1);
      margin-bottom: 16px;
      font-weight: 600;
    }
    .preview-body-text {
      font-size: 13.5px;
      color: var(--txt-2);
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--bg-sub);
      border-radius: var(--r8);
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .preview-link {
      font-size: 13px;
      color: #4285f4;
      text-decoration: underline;
      word-break: break-all;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/index.html" class="brand">
    <span class="brand-name">We-Connect</span>
  </a>
  <div class="spacer"></div>
  <a href="/index.html" style="color:#fff;font-weight:700">발송</a>
  <a href="/customers.html" data-role="admin">고객사</a>
  <a href="/messages.html">메시지</a>
  <a href="/history.html" data-role="admin">이력</a>
  <a href="/settings.html" data-role="admin">⚙️</a>
  <span id="navUserName" class="user-name"></span>
  <button class="btn-logout" onclick="logout()">로그아웃</button>
</nav>

<div class="container">
  <div style="display:grid;grid-template-columns:1fr 460px;gap:20px" id="layout">

    <!-- 왼쪽: 수신자 검색 -->
    <div class="recv-card">
      <div class="card">
        <div class="card-header">
          🔍 수신자 검색
          <span id="selectedBadge" class="badge badge-kakao" style="margin-left:auto">0명 선택</span>
        </div>
        <div class="card-body" style="padding-bottom:0">
          <div class="input-group" style="margin-bottom:12px">
            <input type="text" id="searchInput" placeholder="회사명 / 담당자 / 연락처 검색">
            <button class="btn btn-kakao" onclick="searchCustomers()">검색</button>
            <button class="btn btn-outline" onclick="loadAll()">전체</button>
          </div>
          <div style="display:flex;gap:6px;margin-bottom:10px">
            <button class="btn btn-outline btn-sm" onclick="selectAll()">전체선택</button>
            <button class="btn btn-outline btn-sm" onclick="deselectAll()">선택해제</button>
            <span id="resultCount" style="margin-left:auto;font-size:12px;color:var(--txt-3);align-self:center"></span>
          </div>
        </div>
        <div class="recv-table-wrap">
          <table style="min-width:700px">
            <thead>
              <tr>
                <th width="36"><input type="checkbox" id="checkAll" onchange="toggleAll(this)"></th>
                <th style="min-width:110px">회사명</th>
                <th class="hide-mobile" style="min-width:72px">담당자</th>
                <th style="min-width:120px">연락처</th>
                <th class="hide-mobile" style="min-width:140px">이메일</th>
                <th class="hide-mobile" style="min-width:100px">산업군</th>
                <th class="hide-mobile" style="min-width:80px">비고</th>
              </tr>
            </thead>
            <tbody id="customerTable">
              <tr><td colspan="7" class="empty-state" style="padding:32px">검색하거나 [전체]를 눌러 목록을 불러오세요</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 오른쪽: 발송 패널 -->
    <div>
      <div class="card">
        <div class="card-header">📧 이메일 발송</div>
        <div class="card-body">

          <!-- 발신자 이메일 표시 -->
          <div style="font-size:12.5px;background:var(--bg-sub);border-radius:var(--r8);padding:8px 12px;margin-bottom:14px;color:var(--txt-2)">
            📤 발신자: <strong id="senderEmailDisplay" style="color:var(--indigo)">-</strong>
          </div>

          <!-- 홍보 콘텐츠 선택 -->
          <div class="form-group">
            <label>홍보 콘텐츠 선택 <span style="color:var(--red)">*</span></label>
            <select id="emailTemplateSelect" onchange="onTemplateChange()">
              <option value="">-- 콘텐츠를 선택하세요 --</option>
            </select>
          </div>

          <!-- 링크 표시 -->
          <div class="link-row" id="linkRow">
            링크 : <a id="linkAnchor" href="#" target="_blank"></a>
          </div>

          <!-- 제목 -->
          <div class="form-group">
            <label>제목 <span style="color:var(--red)">*</span></label>
            <input type="text" id="emailSubject" placeholder="이메일 제목을 입력하세요">
          </div>

          <!-- 내용 -->
          <div class="form-group">
            <label>내용 <span style="color:var(--red)">*</span></label>
            <textarea id="emailBody" rows="6" placeholder="발송할 이메일 내용을 입력하세요" style="resize:vertical"></textarea>
          </div>

          <!-- 수신자 정보 -->
          <div class="alert alert-info" id="receiverInfoEmail">수신자를 선택하세요</div>

          <!-- 버튼 -->
          <div class="bottom-btns">
            <button class="btn-preview" onclick="openPreview()">👁 미리보기</button>
            <button class="btn btn-block" onclick="sendEmail()" id="sendEmailBtn"
              style="background:#4285f4;color:#fff;font-weight:700;border:none;padding:13px;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit;margin-top:0">
              📧 이메일 발송
            </button>
          </div>

          <div style="text-align:center;margin-top:10px">
            <a href="/messages.html" style="font-size:12px;color:var(--txt-3);text-decoration:none">＋ 콘텐츠 관리하기</a>
          </div>

        </div>
      </div>

      <!-- 발송 결과 -->
      <div class="card" id="resultCard" style="display:none">
        <div class="card-header">📋 발송 결과</div>
        <div class="card-body" id="resultBody"></div>
      </div>
    </div>

  </div>
</div>

<!-- 미리보기 모달 -->
<div class="preview-modal-wrap" id="previewModal">
  <div class="preview-modal">
    <div class="preview-modal-header">
      📧 이메일 미리보기
      <button class="btn-close" onclick="closePreview()">×</button>
    </div>
    <div class="preview-modal-body">
      <div class="preview-field-label">제목</div>
      <div class="preview-field-value" id="previewSubject"></div>
      <div class="preview-field-label">내용</div>
      <div class="preview-body-text" id="previewBody"></div>
      <div id="previewLinkWrap" style="display:none">
        <div class="preview-field-label">링크</div>
        <a class="preview-link" id="previewLink" href="#" target="_blank"></a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
let selectedIds  = new Set()
let allCustomers = []
let allMessages  = []

document.addEventListener('DOMContentLoaded', async () => {
  const user = await requireAuth()
  if (!user) return
  setupNavByRole(user.role)

  // 발신자 이메일 표시
  const senderEl = document.getElementById('senderEmailDisplay')
  if (senderEl) senderEl.textContent = user.email || '(이메일 미등록 — ⚙️ 설정에서 추가하세요)'

  document.getElementById('searchInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') searchCustomers()
  })

  loadMessages()
  loadAll()
})

// ── 메시지 로드 ──────────────────────────────────────
async function loadMessages() {
  const { data } = await sb.from('messages').select('*').order('title')
  allMessages = data || []
  const emailList = allMessages.filter(m => m.channel === 'email')
  const sel = document.getElementById('emailTemplateSelect')
  sel.innerHTML = '<option value="">-- 콘텐츠를 선택하세요 --</option>'
  emailList.forEach(m => {
    const opt = document.createElement('option')
    opt.value = m.id
    opt.dataset.title   = m.title   || ''
    opt.dataset.content = m.content || ''
    opt.dataset.link    = m.link    || ''
    opt.textContent = m.title
    sel.appendChild(opt)
  })
}

function onTemplateChange() {
  const opt = document.getElementById('emailTemplateSelect').selectedOptions[0]
  if (!opt?.value) {
    document.getElementById('linkRow').style.display = 'none'
    document.getElementById('emailSubject').value = ''
    document.getElementById('emailBody').value = ''
    return
  }

  // 제목·내용 자동 채움
  document.getElementById('emailSubject').value = opt.dataset.title   || ''
  document.getElementById('emailBody').value    = opt.dataset.content || ''

  // 링크 표시
  const link = opt.dataset.link
  const linkRow = document.getElementById('linkRow')
  if (link) {
    document.getElementById('linkAnchor').href        = link
    document.getElementById('linkAnchor').textContent = link
    linkRow.style.display = 'block'
  } else {
    linkRow.style.display = 'none'
  }
}

// ── 미리보기 ──────────────────────────────────────────
function openPreview() {
  const subject = document.getElementById('emailSubject').value.trim()
  const body    = document.getElementById('emailBody').value.trim()
  const opt     = document.getElementById('emailTemplateSelect').selectedOptions[0]
  const link    = opt?.dataset.link || ''

  if (!subject && !body) { showToast('제목 또는 내용을 입력하세요.', 'warning'); return }

  document.getElementById('previewSubject').textContent = subject || '(제목 없음)'
  document.getElementById('previewBody').textContent    = body    || '(내용 없음)'

  const linkWrap = document.getElementById('previewLinkWrap')
  if (link) {
    document.getElementById('previewLink').href        = link
    document.getElementById('previewLink').textContent = link
    linkWrap.style.display = 'block'
  } else {
    linkWrap.style.display = 'none'
  }

  document.getElementById('previewModal').classList.add('open')
}
function closePreview() {
  document.getElementById('previewModal').classList.remove('open')
}

// ── 고객사 검색 ──────────────────────────────────────
async function loadAll() {
  const { data, error } = await sb.from('customers').select('*').order('company_name')
  if (error) { showToast('고객사 로드 실패: ' + error.message, 'danger'); return }
  renderTable(data || [])
}

async function searchCustomers() {
  const q = document.getElementById('searchInput').value.trim()
  if (!q) { loadAll(); return }
  const { data } = await sb.from('customers').select('*')
    .or(`company_name.ilike.%${q}%,contact_name.ilike.%${q}%,phone.ilike.%${q}%,email.ilike.%${q}%,industry.ilike.%${q}%,memo.ilike.%${q}%`)
    .order('company_name')
  renderTable(data || [])
}

function renderTable(list) {
  allCustomers = list
  document.getElementById('resultCount').textContent = `${list.length}건`
  const tbody = document.getElementById('customerTable')

  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><span class="icon">🔍</span><div>검색 결과가 없습니다.</div></div></td></tr>'
    return
  }

  tbody.innerHTML = list.map(c => `
    <tr id="row-${c.id}" class="${selectedIds.has(c.id) ? 'selected' : ''}"
        onclick="toggleRow(${c.id})" style="cursor:pointer">
      <td onclick="event.stopPropagation()">
        <input type="checkbox" class="row-cb" value="${c.id}"
               ${selectedIds.has(c.id) ? 'checked' : ''} onchange="toggleCheck(${c.id}, this)">
      </td>
      <td><strong>${c.company_name}</strong></td>
      <td class="hide-mobile">${c.contact_name || '-'}</td>
      <td>
        ${c.phone
          ? `<span class="badge badge-kakao">${c.phone}</span>`
          : '<span style="color:var(--red);font-size:12px">미등록</span>'}
      </td>
      <td class="hide-mobile email-cell" style="font-size:12px;color:var(--txt-2)">
        ${c.email || '<span style="color:var(--txt-3)">-</span>'}
      </td>
      <td class="hide-mobile">
        ${c.industry ? `<span class="badge badge-gray" style="font-size:11px">${c.industry}</span>` : '-'}
      </td>
      <td class="hide-mobile" style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt-3);font-size:12px">${c.memo || ''}</td>
    </tr>
  `).join('')
  updateCount()
}

function toggleRow(id) {
  const cb = document.querySelector(`.row-cb[value="${id}"]`)
  if (cb) { cb.checked = !cb.checked; toggleCheck(id, cb) }
}
function toggleCheck(id, cb) {
  const row = document.getElementById(`row-${id}`)
  if (cb.checked) { selectedIds.add(id);    row?.classList.add('selected') }
  else            { selectedIds.delete(id); row?.classList.remove('selected') }
  updateCount()
}
function toggleAll(cb) {
  allCustomers.forEach(c => {
    const checkbox = document.querySelector(`.row-cb[value="${c.id}"]`)
    if (checkbox) { checkbox.checked = cb.checked; toggleCheck(c.id, checkbox) }
  })
}
function selectAll()   { document.getElementById('checkAll').checked = true;  toggleAll({ checked: true }) }
function deselectAll() { document.getElementById('checkAll').checked = false; toggleAll({ checked: false }) }

function updateCount() {
  const n = selectedIds.size
  document.getElementById('selectedBadge').textContent = `${n}명 선택`
  const msg = n > 0 ? `👥 ${n}명에게 발송 예정` : '수신자를 선택하세요'
  document.getElementById('receiverInfoEmail').textContent = msg
}

// ── 이메일 발송 ───────────────────────────────────────
async function sendEmail() {
  const subject = document.getElementById('emailSubject').value.trim()
  const body    = document.getElementById('emailBody').value.trim()
  const opt     = document.getElementById('emailTemplateSelect').selectedOptions[0]

  if (!opt?.value) { showToast('홍보 콘텐츠를 선택하세요.', 'warning'); return }
  if (!subject)    { showToast('이메일 제목을 입력하세요.', 'warning'); return }
  if (!body)       { showToast('이메일 내용을 입력하세요.', 'warning'); return }
  if (selectedIds.size === 0) { showToast('수신자를 선택하세요.', 'warning'); return }

  const receivers = allCustomers.filter(c => selectedIds.has(c.id))
  const noEmail = receivers.filter(c => !c.email)
  if (noEmail.length === receivers.length) {
    showToast('선택한 수신자 중 이메일이 등록된 고객사가 없습니다.', 'danger'); return
  }

  const { data: ec } = await sb.from('email_config').select('*').eq('id', 1).single()
  if (!IS_DEMO && (!ec?.smtp_host || !ec?.smtp_user || !ec?.smtp_pass)) {
    showToast('이메일 SMTP 설정이 없습니다. ⚙️ 설정 메뉴를 확인하세요.', 'warning'); return
  }

  const currentUser = getCurrentUser()
  const fromEmail = currentUser?.email || ec?.smtp_user || ''

  let smtp = null
  if (ec?.smtp_host) {
    smtp = { host: ec.smtp_host, port: ec.smtp_port, user: ec.smtp_user, pass: ec.smtp_pass, from_name: ec.from_name, from_email: fromEmail }
  }

  const btn = document.getElementById('sendEmailBtn')
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span> 발송 중...'

  try {
    const resp = await fetch('/.netlify/functions/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subject, body, receivers, smtp })
    })
    const result = await resp.json()

    const _me = getCurrentUser()
    await sb.from('send_history').insert({
      title: '[이메일] ' + subject,
      template_code: 'EMAIL',
      customer_count: receivers.length,
      success_count:  result.successCount || 0,
      fail_count:     result.failCount || 0,
      recipients:     result.results || [],
      sent_by:        _me?.name || _me?.username || '-'
    })

    showResultCard(result)
    showToast(result.message, result.success ? 'success' : 'danger')
  } catch (e) {
    showToast('오류: ' + e.message, 'danger')
  } finally {
    btn.disabled = false
    btn.innerHTML = '📧 이메일 발송'
  }
}

function showResultCard(result) {
  document.getElementById('resultCard').style.display = 'block'
  document.getElementById('resultBody').innerHTML = `
    <div style="font-weight:700;font-size:15px;color:${result.success ? 'var(--green)' : 'var(--red)'};margin-bottom:12px">
      ${result.success ? '✅' : '❌'} ${result.message}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div style="background:var(--green-bg);border-radius:var(--r8);padding:12px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:var(--green)">${result.successCount||0}</div>
        <div style="font-size:11.5px;color:var(--green);margin-top:2px">성공</div>
      </div>
      <div style="background:var(--red-bg);border-radius:var(--r8);padding:12px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:var(--red)">${result.failCount||0}</div>
        <div style="font-size:11.5px;color:var(--red);margin-top:2px">실패</div>
      </div>
    </div>
    ${(result.results||[]).slice(0,5).map(r =>
      `<div style="font-size:13px;padding:4px 0;color:${r.status==='success'?'var(--green)':'var(--red)'}">
        ${r.status==='success'?'✓':'✗'} ${r.name}${r.reason ? ` (${r.reason})` : ''}
       </div>`
    ).join('')}
    <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--bdr-s)">
      <a href="/history.html" style="font-size:13px;color:var(--indigo);text-decoration:none;font-weight:500">→ 발송 이력 전체 보기</a>
    </div>
  `
}
</script>
</body>
</html>
